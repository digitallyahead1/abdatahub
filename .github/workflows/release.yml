name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Create Release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref }}
        release_name: Release ${{ github.ref }}
        draft: false
        prerelease: false
        body: |
          # AB Data Hub Release ${{ github.ref }}

          ## Changes

          Please see the commit log for details.

          ## Installation

          ```bash
          docker pull abdatahub/backend:${{ github.ref }}
          docker pull abdatahub/frontend:${{ github.ref }}
          ```

          ## Documentation

          - [API Documentation](https://docs.abdatahub.com/api)
          - [Deployment Guide](https://docs.abdatahub.com/deployment)
          - [Contributing Guide](./CONTRIBUTING.md)
