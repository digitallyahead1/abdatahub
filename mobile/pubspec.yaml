name: ab_data_hub
description: "AB Data Hub - Premium VTU & Fintech Platform Mobile App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.13.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  provider: ^6.0.0
  riverpod: ^2.4.0
  flutter_riverpod: ^2.4.0
  dio: ^5.3.0
  get_storage: ^2.1.1
  flutter_secure_storage: ^9.0.0
  google_fonts: ^6.1.0
  cached_network_image: ^3.3.0
  intl: ^0.19.0
  uuid: ^4.0.0
  connectivity_plus: ^5.0.0
  permission_handler: ^11.4.0
  share_plus: ^7.2.0
  url_launcher: ^6.2.0
  pin_code_fields: ^8.0.0
  webview_flutter: ^4.4.0
  animated_bottom_navigation_bar: ^1.3.0
  flutter_svg: ^2.0.0
  iconly: ^1.0.2
  fl_chart: ^0.65.0
  shimmer: ^3.0.0
  pull_to_refresh: ^2.0.0
  flutter_dotenv: ^5.1.0
  firebase_core: ^2.24.0
  firebase_messaging: ^14.6.0
  firebase_analytics: ^10.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  mockito: ^5.4.0
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/svg/
    - .env
  
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
    
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
    
    - family: Manrope
      fonts:
        - asset: assets/fonts/Manrope-Regular.ttf
        - asset: assets/fonts/Manrope-Medium.ttf
          weight: 500
        - asset: assets/fonts/Manrope-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Manrope-Bold.ttf
          weight: 700
