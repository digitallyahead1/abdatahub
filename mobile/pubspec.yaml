name: ab_data_hub
description: "AB Data Hub - Premium VTU & Fintech Platform Mobile App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  provider: ^6.0.0
  dio: ^5.3.0
  flutter_secure_storage: ^9.0.0
  google_fonts: ^6.1.0
  intl: ^0.19.0
  url_launcher: ^6.2.0
  pin_code_fields: ^8.0.0
  flutter_dotenv: ^5.1.0
  pdf: ^3.10.7
  printing: ^5.11.0
  path_provider: ^2.1.1
  share_plus: ^7.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/svg/
    - .env
